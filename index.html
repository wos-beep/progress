<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[v1.7.3] Status Tracker - ボタン配置整理版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --accent: #03dac6; --border: #333; }
        body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: var(--bg-color); color: var(--text-color); }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
        .version-tag { font-size: 0.7em; color: #888; background: #333; padding: 2px 8px; border-radius: 4px; }
        h3 { margin-top: 0; color: var(--accent); border-left: 4px solid var(--accent); padding-left: 10px; font-size: 16px; }
        textarea { width: 100%; height: 80px; padding: 10px; background: #2c2c2c; color: #fff; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        
        /* フィルタボタンのグリッドレイアウト */
        .btn-group { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-top: 10px; 
        }
        button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; transition: 0.2s; }
        .btn-main { background: var(--accent); color: #000; grid-column: span 3; margin-top: 5px; }
        .btn-filter { background: #444; color: #fff; width: 100%; }
        .btn-all { grid-column: span 3; background: #666; color: #fff; margin-top: 5px; }
        
        .edit-grid { display: flex; flex-direction: column; gap: 8px; background: #252525; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .edit-row { display: flex; gap: 5px; align-items: center; background: #333; padding: 5px; border-radius: 6px; }
        .edit-row input[type="text"] { background: #222; color: var(--accent); border: 1px solid #444; padding: 5px; flex: 2; font-size: 12px; border-radius: 4px; }
        .edit-row input[type="number"] { background: #222; color: #fff; border: 1px solid #444; padding: 5px; flex: 1; font-size: 12px; border-radius: 4px; }
        .btn-del { background: #f44336; color: #fff; padding: 5px 8px; font-size: 10px; }
        .canvas-container { position: relative; height: 500px; width: 100%; }
        input[type="date"] { padding: 8px; background: #2c2c2c; color: #fff; border: 1px solid #444; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header-flex">
        <h2>📈 Status Tracker <span class="version-tag">v1.7.3</span></h2>
        <div>
            <button onclick="exportData()" style="font-size:10px; background:#444; color:#fff;">Export</button>
            <button onclick="document.getElementById('fileInput').click()" style="font-size:10px; background:#444; color:#fff;">Import</button>
            <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
        </div>
    </div>

    <div class="card">
        <h3>1. データの取り込み</h3>
        <input type="date" id="inputDate" style="margin-bottom:10px;">
        <textarea id="ocrInput" placeholder="項目名と数値が混ざったテキストを貼り付けてください"></textarea>
        <button class="btn-main" onclick="parseText()">数値を抽出して確認</button>
        <div id="editArea" style="display:none; border-top: 1px solid #333; margin-top: 15px; padding-top: 10px;">
            <div id="statsGrid" class="edit-grid"></div>
            <button class="btn-main" onclick="saveToStorage()">この内容で統合保存</button>
        </div>
    </div>

    <div class="card">
        <h3>2. 成長推移</h3>
        <div class="btn-group">
            <button class="btn-filter" onclick="filterGroup('盾兵')">🛡️ 盾兵バフ</button>
            <button class="btn-filter" onclick="filterGroup('槍兵')">⚔️ 槍兵バフ</button>
            <button class="btn-filter" onclick="filterGroup('弓兵')">🏹 弓兵バフ</button>
            <button class="btn-filter" onclick="filterGroup('部隊')">🏢 部隊バフ</button>
            <button class="btn-filter" onclick="filterGroup('兵士数')">👥 兵士数推移</button>
            <button class="btn-filter" onclick="filterGroup('その他')">📦 その他</button>
            <button class="btn-all" onclick="filterGroup('all')">全表示</button>
        </div>
        <div class="canvas-container">
            <canvas id="growthChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>3. 履歴管理</h3>
        <div id="historyList"></div>
    </div>

    <script>
        let myChart;
        const storageKey = 'game_stats_v1.2.0'; 
        const soldierKeywords = ["烈日", "切り札"];
        const buffSuffixes = ["攻撃力", "防御力", "殺傷力", "HP", "攻擊力"];

        window.onload = () => {
            document.getElementById('inputDate').valueAsDate = new Date();
            updateChart();
            renderHistory();
        };

        function normalizeLabel(label) {
            if (!label) return "";
            let clean = label.replace(/[\s　]/g, '');
            clean = clean.replace(/攻撃力/g, '攻擊力');
            return clean;
        }

        function parseText() {
            const rawText = document.getElementById('ocrInput').value;
            if (!rawText) return;
            const cleanText = rawText.replace(/%/g, '').replace(/,/g, '');
            const tokens = cleanText.match(/[一-龠ぁ-んァ-ヶーA-Za-z]+|[\d.]+/g) || [];
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = '';
            for (let i = 0; i < tokens.length; i++) {
                if (isNaN(tokens[i])) {
                    const label = tokens[i];
                    const nextVal = tokens[i+1];
                    if (nextVal && !isNaN(nextVal)) {
                        addEditRow(normalizeLabel(label), nextVal);
                        i++;
                    }
                }
            }
            document.getElementById('editArea').style.display = 'block';
        }

        function addEditRow(label, value) {
            const grid = document.getElementById('statsGrid');
            const row = document.createElement('div');
            row.className = 'edit-row';
            row.innerHTML = `
                <input type="text" class="stat-label-input" value="${label}">
                <input type="number" step="0.01" class="stat-value-input" value="${value}">
                <button class="btn-del" onclick="this.parentElement.remove()">×</button>
            `;
            grid.appendChild(row);
        }

        function saveToStorage() {
            const date = document.getElementById('inputDate').value;
            const rows = document.querySelectorAll('.edit-row');
            const newStats = {};
            rows.forEach(row => {
                const label = normalizeLabel(row.querySelector('.stat-label-input').value);
                const val = parseFloat(row.querySelector('.stat-value-input').value);
                if (label && !isNaN(val)) newStats[label] = val;
            });
            const rawData = localStorage.getItem(storageKey);
            let history = rawData ? JSON.parse(rawData) : [];
            const idx = history.findIndex(d => d.date === date);
            if (idx > -1) { history[idx].stats = Object.assign({}, history[idx].stats, newStats); }
            else { history.push({ date, stats: newStats }); }
            history.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem(storageKey, JSON.stringify(history));
            document.getElementById('editArea').style.display = 'none';
            document.getElementById('ocrInput').value = '';
            updateChart();
            renderHistory();
        }

        function updateChart() {
            const rawData = localStorage.getItem(storageKey);
            if (!rawData) return;
            const history = JSON.parse(rawData);
            let allKeys = new Set();
            history.forEach(d => { Object.keys(d.stats).forEach(k => allKeys.add(normalizeLabel(k))); });
            const dynamicTargets = Array.from(allKeys);
            const labels = history.map(d => d.date);
            const colors = ['#03dac6', '#bb86fc', '#ff0266', '#ffde03', '#03a9f4', '#4caf50', '#ff9800', '#f44336', '#9c27b0', '#795548', '#607d8b', '#e91e63', '#1abc9c', '#2ecc71', '#3498db', '#9b59b6', '#aed581', '#ff8a65', '#d4e157', '#4db6ac'];
            const datasets = dynamicTargets.map((target, i) => {
                const isRealNum = soldierKeywords.some(k => target.includes(k)) || target.includes("容量");
                return {
                    label: target,
                    data: history.map(d => d.stats[target] !== undefined ? d.stats[target] : null),
                    borderColor: colors[i % colors.length],
                    backgroundColor: colors[i % colors.length],
                    yAxisID: isRealNum ? 'y1' : 'y',
                    tension: 0.2,
                    spanGaps: true,
                    hidden: false
                };
            });
            const ctx = document.getElementById('growthChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true, position: 'bottom', labels: { color: '#aaa', font: { size: 9 }, boxWidth: 10 } } },
                    scales: { 
                        x: { ticks: { color: '#aaa' }, grid: { color: '#333' } },
                        y: { position: 'left', ticks: { color: '#03dac6', callback: v => v + '%' }, title: { display: true, text: 'バフ / 速度 %', color: '#03dac6' } },
                        y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#bb86fc', callback: v => v.toLocaleString() }, title: { display: true, text: '実数（人数・容量）', color: '#bb86fc' } }
                    }
                }
            });
        }

        function filterGroup(groupName) {
            myChart.data.datasets.forEach(ds => {
                const label = ds.label;
                const isSoldier = soldierKeywords.some(k => label.includes(k));
                const isBuff = buffSuffixes.some(s => label.includes(s));
                if (groupName === 'all') { ds.hidden = false; }
                else if (groupName === '兵士数') { ds.hidden = !isSoldier; }
                else if (groupName === '部隊') { ds.hidden = !(label.startsWith('部隊') && isBuff); }
                else if (groupName === '盾兵') { ds.hidden = !(label.startsWith('盾兵') && isBuff); }
                else if (groupName === '槍兵') { ds.hidden = !(label.startsWith('槍兵') && isBuff); }
                else if (groupName === '弓兵') { ds.hidden = !(label.startsWith('弓兵') && isBuff); }
                else if (groupName === 'その他') {
                    const isMainBuff = (label.startsWith('部隊') || label.startsWith('盾兵') || label.startsWith('槍兵') || label.startsWith('弓兵')) && isBuff;
                    ds.hidden = (isSoldier || isMainBuff);
                }
            });
            myChart.update();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem(storageKey) || "[]");
            let html = `<table style="width:100%; font-size:12px;">`;
            history.forEach((entry, i) => {
                html += `<tr style="border-bottom:1px solid #333;"><td style="padding:8px;">${entry.date}</td><td style="text-align:right;"><button onclick="editHistory(${i})" style="background:#03a9f4; padding:3px 7px; font-size:10px;">修正</button></td></tr>`;
            });
            document.getElementById('historyList').innerHTML = html + `</table>`;
        }

        function editHistory(index) {
            const entry = JSON.parse(localStorage.getItem(storageKey))[index];
            document.getElementById('inputDate').value = entry.date;
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = '';
            for (let label in entry.stats) { addEditRow(label, entry.stats[label]); }
            document.getElementById('editArea').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exportData() {
            const data = localStorage.getItem(storageKey);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], { type: 'application/json' }));
            a.download = `status_tracker_v173.json`;
            a.click();
        }

        function importData(e) {
            const r = new FileReader();
            r.onload = (ev) => { localStorage.setItem(storageKey, ev.target.result); location.reload(); };
            r.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
